<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>아빠 퇴직연금</title>
<style>
:root{
  --bg:#f4f6fb; --card:#ffffff; --ink:#1a2233; --sub:#68738a; --line:#e7ebf3;
  --up:#e5384f; --down:#2f6fed; --flat:#8a94a6; --brand:#2f6fed; --brand2:#5b8cff;
  --shadow:0 2px 14px rgba(24,39,75,.06);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;}
.wrap{max-width:760px;margin:0 auto;padding:16px 16px 60px;}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 2px 14px;}
.title{font-size:19px;font-weight:800;letter-spacing:-.3px;}
.subtitle{font-size:12.5px;color:var(--sub);margin-top:2px;}
.pill{font-size:11.5px;color:var(--sub);background:#eef2f9;border-radius:999px;padding:5px 10px;white-space:nowrap;}
.pill b{color:#159a52;font-weight:700}
.btn{border:0;background:var(--brand);color:#fff;font-weight:700;font-size:13px;border-radius:10px;padding:9px 14px;cursor:pointer;}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:#eaf0fb;color:var(--brand)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:14px;}
.hero .label{font-size:13px;color:var(--sub);font-weight:600;}
.hero .total{font-size:38px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px;}
.hero .pl{font-size:16px;font-weight:700;}
.hero .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:13px;color:var(--sub);}
.hero .meta b{color:var(--ink);font-weight:700}
.sec-h{font-size:14px;font-weight:800;margin:2px 0 14px;display:flex;align-items:center;gap:8px;}
.sec-h .dot{width:8px;height:8px;border-radius:3px;background:var(--brand)}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
/* donut */
.alloc{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.legend{flex:1;min-width:180px;}
.legrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;}
.legrow .sw{width:11px;height:11px;border-radius:3px;flex:none}
.legrow .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legrow .pc{font-weight:700;color:var(--sub)}
/* holding */
.hold{display:flex;align-items:center;gap:12px;padding:14px 0;border-top:1px solid var(--line);}
.hold:first-of-type{border-top:0}
.hold .ic{width:42px;height:42px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;}
.hold .info{flex:1;min-width:0}
.hold .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hold .code{font-size:11.5px;color:var(--sub);margin-top:1px}
.hold .rt{text-align:right;white-space:nowrap}
.hold .rt .px{font-weight:700;font-size:15px}
.hold .rt .ch{font-size:12px;font-weight:600;margin-top:1px}
.hbar{height:5px;background:#eef1f7;border-radius:99px;margin-top:9px;overflow:hidden}
.hbar>span{display:block;height:100%;border-radius:99px}
.hd2{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:8px}
.hd2 b{color:var(--ink)}
/* notes / timeline */
.note{font-size:14px;line-height:1.65;color:#2b3547;background:#f6f9ff;border:1px solid #e3ecff;border-radius:12px;padding:13px 15px;margin-bottom:10px;}
.note .when{font-size:11.5px;color:var(--sub);margin-bottom:4px}
.tl{position:relative;padding-left:22px;}
.tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.ev{position:relative;padding:0 0 18px 4px;}
.ev:last-child{padding-bottom:0}
.ev .mk{position:absolute;left:-22px;top:2px;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--line)}
.ev .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:800;border-radius:6px;padding:2px 7px;color:#fff}
.b-buy{background:var(--up)} .b-sell{background:var(--down)} .b-dep{background:#5b8cff} .b-div{background:#159a52} .b-wd{background:#8a94a6}
.ev .t{font-size:11.5px;color:var(--sub)}
.ev .main{font-size:14px;font-weight:700;margin:3px 0 2px}
.ev .reason{font-size:13px;color:#48546b;line-height:1.6}
.empty{text-align:center;color:var(--sub);padding:26px 10px;font-size:14px;line-height:1.7}
.foot{text-align:center;color:#aab2c2;font-size:11.5px;margin-top:22px;line-height:1.6}
.skel{color:var(--sub);text-align:center;padding:40px;font-size:14px}
@media(max-width:480px){.hero .total{font-size:32px}.wrap{padding-left:12px;padding-right:12px}}
/* look-through */
.lt-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
.lt-row:first-of-type{border-top:0}
.lt-row .rank{width:18px;color:var(--sub);font-size:12px;font-weight:700}
.lt-row .nm2{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.lt-bar{flex:2;height:6px;background:#eef1f7;border-radius:99px;overflow:hidden}
.lt-bar>span{display:block;height:100%;background:var(--brand)}
.lt-row .pc2{width:56px;text-align:right;font-weight:700;font-size:13.5px}
/* admin */
.gear{position:fixed;right:14px;bottom:14px;width:38px;height:38px;border-radius:50%;background:#fff;
  border:1px solid var(--line);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--sub);cursor:pointer;z-index:40;opacity:.6}
.gear:active{transform:scale(.94)}
.modal-bg{position:fixed;inset:0;background:rgba(20,26,40,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:18px 18px 26px}
@media(min-width:560px){.modal-bg{align-items:center}.modal{border-radius:18px}}
.modal h3{font-size:16px;margin:14px 0 12px}
.modal h3:first-child{margin-top:0}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600}
.frow input,.frow textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;
  font-size:14px;font-family:inherit;background:#fbfcff}
.frow textarea{resize:vertical;min-height:56px}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg button{flex:1;min-width:60px;border:1px solid var(--line);background:#f6f8fc;border-radius:9px;
  padding:8px 6px;font-size:12.5px;font-weight:700;color:var(--sub);cursor:pointer}
.seg button.on{background:var(--brand);border-color:var(--brand);color:#fff}
.msg{font-size:12.5px;padding:8px 10px;border-radius:8px;margin-top:10px;min-height:14px}
.msg.ok{background:#eafaf0;color:#159a52}
.msg.err{background:#fdeef0;color:var(--up)}
.rtx{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line);font-size:12.5px}
.rtx:first-of-type{border-top:0}
.rtx .rmain{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtx button{border:0;background:#fdeef0;color:var(--up);font-size:11px;font-weight:700;border-radius:6px;padding:4px 8px;cursor:pointer}
.tokrow{display:flex;gap:8px}
.tokrow input{flex:1}
.small{font-size:11.5px;color:var(--sub);line-height:1.6;margin-top:6px}
.link{color:var(--brand);text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="title" id="m-title">아빠 퇴직연금</div>
      <div class="subtitle" id="m-sub">ETF 모의 운용</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="pill" id="src-pill">시세 연결 중…</span>
      <button class="btn ghost" id="btn-refresh" onclick="refresh()">↻ 새로고침</button>
    </div>
  </div>

  <div id="app"><div class="skel">불러오는 중…</div></div>

  <div class="foot" id="foot"></div>
</div>

<div class="gear" id="gear-btn" onclick="openModal()" title="관리">⚙</div>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modal-body"></div></div>
</div>

<script>
const PALETTE=['#2f6fed','#e5384f','#159a52','#f59e0b','#8b5cf6','#0ea5e9','#ec4899','#14b8a6','#f97316','#64748b'];
const $=id=>document.getElementById(id);
const won=n=>Math.round(n).toLocaleString('ko-KR');
const pct=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const cls=n=>n>0?'up':n<0?'down':'flat';
const arrow=n=>n>0?'▲':n<0?'▼':'–';
let DATA=null, PX={};

/* ---------- 시세 ---------- */
const PROXIES=[u=>u,u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)];
let goodProxy=+(localStorage.getItem('pf_proxy')||0);
async function fetchJson(url){
  const order=[...new Set([goodProxy,0,1,2,3])];
  for(const i of order){try{
    const r=await fetch(PROXIES[i](url),{signal:AbortSignal.timeout(9000)});
    if(!r.ok)continue; const j=await r.json();
    goodProxy=i; localStorage.setItem('pf_proxy',i); return j;
  }catch(e){}}
  throw new Error('시세 실패');
}
const KIS_REMOTE='https://wqehreukcaluzjjzhdew.supabase.co/functions/v1/kis-quote';
let kisBase=null;
async function checkKis(){
  kisBase=null;
  try{const r=await fetch(KIS_REMOTE+'/health',{signal:AbortSignal.timeout(5000)});
    if(r.ok&&(await r.json()).ok)kisBase=KIS_REMOTE;}catch(e){}
  $('src-pill').innerHTML=kisBase?'시세 <b>KIS 실시간</b>':'시세 <span style="color:#68738a">지연(공개)</span>';
  return !!kisBase;
}
async function kQuote(code){
  const r=await fetch(kisBase+'/quote?code='+code,{signal:AbortSignal.timeout(5000)});
  if(!r.ok)throw 0; const j=await r.json(); if(j.price==null)throw 0;
  return {price:j.price,prevClose:j.prevClose};
}
async function nQuote(code){
  const j=await fetchJson('https://polling.finance.naver.com/api/realtime/domestic/stock/'+code);
  const d=(j.datas||[])[0]; if(!d||d.nv==null)throw 0;
  return {price:d.nv,prevClose:d.sv??(d.cv!=null?d.nv-d.cv:null),name:d.nm};
}
async function yQuote(sym){
  const j=await fetchJson('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?range=1d&interval=1d');
  const m=j.chart.result[0].meta;
  return {price:m.regularMarketPrice,prevClose:m.chartPreviousClose??m.previousClose??null};
}
async function quote(sym){
  const code=sym.split('.')[0];
  if(kisBase){try{return await kQuote(code);}catch(e){}}
  try{return await nQuote(code);}catch(e){return await yQuote(sym);}
}

/* ---------- 로드 ---------- */
async function load(){
  try{
    const r=await fetch('data.json?_='+Date.now());
    DATA=await r.json();
    PX=Object.fromEntries(Object.entries(DATA.prices||{}).map(([k,v])=>[k,{price:v.price,prevClose:v.prevClose}]));
    render();
    await refresh();
  }catch(e){ $('app').innerHTML='<div class="card empty">데이터를 불러오지 못했어요.<br>같은 폴더의 data.json을 확인해 주세요.</div>'; }
}
async function refresh(){
  if(!DATA)return;
  $('btn-refresh').disabled=true; $('btn-refresh').textContent='↻ 갱신 중…';
  await checkKis();
  const syms=Object.keys(DATA.holdings||{});
  const res=await Promise.allSettled(syms.map(s=>quote(s).then(q=>[s,q])));
  for(const r of res){ if(r.status==='fulfilled'){const[s,q]=r.value; PX[s]={...PX[s],...q};} }
  $('btn-refresh').disabled=false; $('btn-refresh').textContent='↻ 새로고침';
  render();
}

/* ---------- 계산 ---------- */
function calc(){
  const H=DATA.holdings||{}; const rows=[];
  let stock=0, prevStock=0, cost=0;
  for(const [sym,h] of Object.entries(H)){
    const p=PX[sym]||{}; const avg=h.qty?h.cost/h.qty:0;
    const price=p.price??avg; const prev=p.prevClose??price;
    const val=price*h.qty; stock+=val; prevStock+=prev*h.qty; cost+=h.cost;
    rows.push({sym,name:h.name,qty:h.qty,avg,price,prev,val,
      plPct:avg?(price/avg-1)*100:0, dayPct:prev?(price/prev-1)*100:0});
  }
  rows.sort((a,b)=>b.val-a.val);
  const cash=DATA.cash||0; const total=stock+cash;
  const principal=(DATA.account?.initialCash||0)
    +sum(DATA.transactions,t=>t.side==='deposit'?t.amount:0)
    -sum(DATA.transactions,t=>t.side==='withdraw'?t.amount:0);
  return {rows,stock,cash,total,principal,cost,
    pl:total-principal, plPct:principal?(total/principal-1)*100:0,
    dayChange:stock-prevStock, dayPct:prevStock?(stock/prevStock-1)*100:0};
}
const sum=(a,f)=>(a||[]).reduce((s,x)=>s+(f(x)||0),0);

function lookThrough(c){
  const comp=DATA.etfCompositions||{};
  const map={}; let uncatVal=0; const uncatNames=[];
  for(const r of c.rows){
    const entry=comp[r.sym];
    if(!entry||!entry.items||!entry.items.length){ uncatVal+=r.val; uncatNames.push(r.name); continue; }
    for(const it of entry.items){
      const v=r.val*(it.weight/100);
      if(!map[it.code]) map[it.code]={name:it.name,val:0};
      map[it.code].val+=v;
    }
  }
  const arr=Object.entries(map).map(([code,v])=>({code,name:v.name,val:v.val}));
  arr.sort((a,b)=>b.val-a.val);
  return {arr,uncatVal,uncatNames};
}

/* ---------- 렌더 ---------- */
function render(){
  if(!DATA)return;
  $('m-title').textContent=DATA.meta?.title||'아빠 퇴직연금';
  $('m-sub').textContent=DATA.meta?.subtitle||'';
  const c=calc();
  let html='';
  // hero
  html+=`<div class="card hero">
    <div class="label">총 평가액</div>
    <div class="total">${won(c.total)}<span style="font-size:20px;font-weight:700"> 원</span></div>
    <div class="pl ${cls(c.pl)}">평가손익 ${c.pl>=0?'+':''}${won(c.pl)}원 (${pct(c.plPct)})</div>
    <div class="meta">
      <span>원금 <b>${won(c.principal)}원</b></span>
      <span>주식 <b>${won(c.stock)}원</b></span>
      <span>현금 <b>${won(c.cash)}원</b></span>
      ${c.stock?`<span>오늘 <b class="${cls(c.dayChange)}">${arrow(c.dayChange)} ${won(Math.abs(c.dayChange))}원 (${pct(c.dayPct)})</b></span>`:''}
    </div>
  </div>`;

  if(c.rows.length){
    // 자산배분
    const items=[...c.rows.map((r,i)=>({name:r.name,val:r.val,color:PALETTE[i%PALETTE.length]})),
                 {name:'현금',val:c.cash,color:'#cfd6e4'}];
    html+=`<div class="card"><div class="sec-h"><span class="dot"></span>자산 배분</div>
      <div class="alloc">${donut(items,c.total)}<div class="legend">${
        items.map(it=>`<div class="legrow"><span class="sw" style="background:${it.color}"></span>
          <span class="nm">${it.name}</span><span class="pc">${(it.val/c.total*100).toFixed(1)}%</span></div>`).join('')
      }</div></div></div>`;

    // 보유 ETF
    html+=`<div class="card"><div class="sec-h"><span class="dot"></span>보유 ETF</div>`;
    for(let i=0;i<c.rows.length;i++){const r=c.rows[i];const col=PALETTE[i%PALETTE.length];
      html+=`<div class="hold">
        <div class="ic" style="background:${col}">${(r.name||'?').slice(0,2)}</div>
        <div class="info">
          <div class="nm">${r.name||r.sym}</div>
          <div class="code">${r.sym.split('.')[0]} · ${r.qty}주 · 평단 ${won(r.avg)}</div>
          <div class="hbar"><span style="width:${(r.val/c.total*100).toFixed(1)}%;background:${col}"></span></div>
          <div class="hd2"><span>평가액 <b>${won(r.val)}원</b></span>
            <span>평가손익 <b class="${cls(r.plPct)}">${pct(r.plPct)}</b></span></div>
        </div>
        <div class="rt"><div class="px">${won(r.price)}</div>
          <div class="ch ${cls(r.dayPct)}">${arrow(r.dayPct)} ${pct(r.dayPct)}</div></div>
      </div>`;
    }
    html+=`</div>`;

    // 개별 종목 비중 (ETF 룩스루)
    const lt=lookThrough(c);
    if(lt.arr.length||lt.uncatVal>0){
      const base=c.total||1;
      html+=`<div class="card"><div class="sec-h"><span class="dot"></span>개별 종목 비중 <span style="font-weight:500;color:var(--sub)">(ETF 룩스루)</span></div>`;
      lt.arr.slice(0,10).forEach((it,i)=>{
        const p=it.val/base*100;
        html+=`<div class="lt-row"><span class="rank">${i+1}</span><span class="nm2">${it.name}</span>
          <div class="lt-bar"><span style="width:${Math.min(p,100).toFixed(1)}%"></span></div>
          <span class="pc2">${p.toFixed(2)}%</span></div>`;
      });
      if(lt.uncatVal>0){
        const p=lt.uncatVal/base*100;
        html+=`<div class="lt-row"><span class="rank">–</span><span class="nm2" style="color:var(--sub)">미분류 (구성종목 미확인: ${lt.uncatNames.join(', ')})</span>
          <div class="lt-bar"><span style="width:${Math.min(p,100).toFixed(1)}%;background:#cfd6e4"></span></div>
          <span class="pc2">${p.toFixed(2)}%</span></div>`;
      }
      const asOfs=Object.entries(DATA.etfCompositions||{}).map(([sym,e])=>`${e.name||sym.split('.')[0]} ${e.asOf||''}`).join(' · ');
      html+=`<div class="small">${asOfs?'구성종목 기준: '+asOfs:'구성종목 데이터가 아직 없어요.'}</div></div>`;
    }
  } else {
    html+=`<div class="card"><div class="empty">아직 담은 ETF가 없어요.<br>
      ${DATA.meta?.managerNote||'곧 포트폴리오를 구성할게요.'}</div></div>`;
  }

  // 예준 코멘트
  const notes=[...(DATA.notes||[])].sort((a,b)=>b.ts<a.ts?-1:1);
  if(DATA.meta?.managerNote || notes.length){
    html+=`<div class="card"><div class="sec-h"><span class="dot"></span>예준의 코멘트</div>`;
    if(DATA.meta?.managerNote && c.rows.length)
      html+=`<div class="note">${esc(DATA.meta.managerNote)}</div>`;
    for(const n of notes) html+=`<div class="note"><div class="when">${n.ts.slice(0,10)}</div>${esc(n.text)}</div>`;
    html+=`</div>`;
  }

  // 매매 일지
  const txs=[...(DATA.transactions||[])].sort((a,b)=>b.ts<a.ts?-1:b.ts>a.ts?1:(b.id||0)-(a.id||0));
  if(txs.length){
    html+=`<div class="card"><div class="sec-h"><span class="dot"></span>매매 일지</div><div class="tl">`;
    for(const t of txs) html+=eventHTML(t);
    html+=`</div></div>`;
  }

  $('app').innerHTML=html;
  const up=DATA.meta?.updated;
  $('foot').innerHTML=`모의 운용 · 실제 매매가 아닙니다<br>${up?'마지막 기록 '+up.replace('T',' ').slice(0,16):''}`;
}
function eventHTML(t){
  const B={buy:['매수','b-buy'],sell:['매도','b-sell'],deposit:['입금','b-dep'],withdraw:['출금','b-wd'],dividend:['분배금','b-div']}[t.side]||['','b-dep'];
  const colors={buy:'var(--up)',sell:'var(--down)',deposit:'#5b8cff',withdraw:'#8a94a6',dividend:'#159a52'};
  let main='';
  if(t.side==='deposit'||t.side==='withdraw') main=`${won(t.amount)}원`;
  else if(t.side==='dividend') main=`${t.name||t.symbol} · 세후 +${won(t.net||0)}원`;
  else main=`${t.name||t.symbol} ${t.qty}주 @ ${won(t.price)}원`;
  return `<div class="ev"><span class="mk" style="box-shadow:0 0 0 1.5px ${colors[t.side]||'#ccc'}"></span>
    <div class="row1"><span class="badge ${B[1]}">${B[0]}</span><span class="t">${t.ts.slice(0,10)}</span></div>
    <div class="main">${main}</div>
    ${t.reason?`<div class="reason">${esc(t.reason)}</div>`:''}</div>`;
}
function donut(items,total){
  const R=54,C=2*Math.PI*R,sz=140; let off=0; let segs='';
  const tot=total||1;
  for(const it of items){ if(it.val<=0)continue; const frac=it.val/tot;
    segs+=`<circle cx="${sz/2}" cy="${sz/2}" r="${R}" fill="none" stroke="${it.color}" stroke-width="20"
      stroke-dasharray="${(frac*C).toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-off*C).toFixed(2)}"
      transform="rotate(-90 ${sz/2} ${sz/2})"/>`; off+=frac; }
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${segs}
    <text x="${sz/2}" y="${sz/2-4}" text-anchor="middle" font-size="11" fill="#68738a">ETF 비중</text>
    <text x="${sz/2}" y="${sz/2+13}" text-anchor="middle" font-size="15" font-weight="800" fill="#1a2233">${
      (100-(items[items.length-1].val/tot*100)).toFixed(0)}%</text></svg>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

/* ---------- 관리자(매매 기록) : 사이트에서 바로 GitHub data.json에 커밋 ---------- */
const GH_OWNER='wnsdPdks', GH_REPO='pension', GH_BRANCH='main', GH_PATH='data.json';
const TOK_KEY='pd_gh_token';
const getTok=()=>localStorage.getItem(TOK_KEY)||'';
const setTok=t=>t?localStorage.setItem(TOK_KEY,t):localStorage.removeItem(TOK_KEY);
function b64enc(str){return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p)));}
function b64dec(str){return decodeURIComponent(atob(str.replace(/\n/g,'')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));}

async function ghGet(){
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`,
    {headers:{Authorization:'token '+getTok(),Accept:'application/vnd.github+json'}});
  if(!r.ok) throw new Error(r.status===404?'저장소/파일을 찾을 수 없어요':r.status===401?'토큰이 유효하지 않아요':'불러오기 실패 ('+r.status+')');
  const j=await r.json();
  return {sha:j.sha, data:JSON.parse(b64dec(j.content))};
}
async function ghPut(sha,data,message){
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
    {method:'PUT',headers:{Authorization:'token '+getTok(),Accept:'application/vnd.github+json','Content-Type':'application/json'},
     body:JSON.stringify({message,content:b64enc(JSON.stringify(data,null,2)),sha,branch:GH_BRANCH})});
  if(!r.ok){ const t=await r.text().catch(()=>''); throw new Error('저장 실패 ('+r.status+') '+t.slice(0,140)); }
  return r.json();
}

function symOf(code){code=String(code); return code.includes('.')?code:code+'.KS';}
function nextId(d){
  const ids=[...(d.transactions||[]).map(t=>t.id||0), ...(d.notes||[]).map(n=>n.id||0)];
  return ids.length?Math.max(...ids)+1:1;
}
function nowIso(){return new Date().toISOString().slice(0,19);}
function recomputeJS(d){
  let cash=d.account?.initialCash||0; const holdings={};
  const txs=[...(d.transactions||[])].sort((a,b)=>a.ts<b.ts?-1:a.ts>b.ts?1:(a.id||0)-(b.id||0));
  for(const t of txs){
    const side=t.side;
    if(side==='deposit'){cash+=t.amount; continue;}
    if(side==='withdraw'){cash-=t.amount; continue;}
    if(side==='dividend'){cash+=(t.net!=null?t.net:t.qty*t.price-(t.tax||0)); continue;}
    const sym=t.symbol;
    const h=holdings[sym]||(holdings[sym]={name:t.name||sym,qty:0,cost:0});
    if(t.name) h.name=t.name;
    const amt=t.qty*t.price;
    if(side==='buy'){cash-=amt+(t.fee||0); h.qty+=t.qty; h.cost+=amt;}
    else if(side==='sell'){
      const avg=h.qty?h.cost/h.qty:0; cash+=amt-(t.fee||0)-(t.tax||0);
      h.cost-=avg*t.qty; h.qty-=t.qty;
      if(h.qty<=1e-9){h.qty=0; h.cost=0;}
    }
  }
  d.holdings=Object.fromEntries(Object.entries(holdings).filter(([,h])=>h.qty>0));
  d.cash=Math.round(cash);
  return d;
}

let busy=false;
async function commit(build,message){
  if(busy) return; busy=true;
  const box=$('m-msg'); if(box){box.className='msg'; box.textContent='저장 중…';}
  try{
    const {sha,data}=await ghGet();
    build(data);
    recomputeJS(data);
    data.meta=data.meta||{}; data.meta.updated=nowIso();
    await ghPut(sha,data,message);
    DATA=data;
    PX=Object.fromEntries(Object.entries(DATA.prices||{}).map(([k,v])=>[k,{price:v.price,prevClose:v.prevClose}]));
    render(); renderAdmin();
    const box2=$('m-msg'); if(box2){box2.className='msg ok'; box2.textContent='저장 완료 · 반영까지 잠시 걸릴 수 있어요';}
  }catch(e){
    const box2=$('m-msg'); if(box2){box2.className='msg err'; box2.textContent=String(e.message||e);}
  }finally{ busy=false; }
}

function openModal(){$('modal-bg').classList.add('open'); renderAdmin();}
function closeModal(){$('modal-bg').classList.remove('open');}

let side='buy';
function setSide(s){side=s; renderAdmin();}
function val(id){const el=$(id); return el?el.value.trim():'';}

function recentTxHtml(){
  const label={buy:'매수',sell:'매도',deposit:'입금',withdraw:'출금',dividend:'분배금'};
  const txs=[...(DATA.transactions||[])].sort((a,b)=>b.ts<a.ts?-1:b.ts>a.ts?1:(b.id||0)-(a.id||0)).slice(0,8);
  if(!txs.length) return '<div class="small">거래 내역 없음</div>';
  return txs.map(t=>{
    const main=(t.side==='deposit'||t.side==='withdraw')?won(t.amount)+'원'
      :t.side==='dividend'?`${t.name||t.symbol} 세후+${won(t.net||0)}원`
      :`${t.name||t.symbol} ${t.qty}주@${won(t.price)}`;
    return `<div class="rtx"><span class="rmain">[${t.ts.slice(0,10)}] ${label[t.side]||t.side} ${main}</span>
      <button onclick="delTx(${t.id})">삭제</button></div>`;
  }).join('');
}

function renderAdmin(){
  const body=$('modal-body'); if(!body||!DATA) return;
  if(!getTok()){
    body.innerHTML=`<h3>관리자 연결</h3>
      <div class="small">GitHub 저장소(<b>${GH_OWNER}/${GH_REPO}</b>)에 쓰기 권한이 있는 Personal Access Token(fine-grained, Contents: Read and write)을 붙여넣으세요. 이 기기의 브라우저에만 저장되고 다른 곳으로 전송되지 않습니다.</div>
      <div class="frow" style="margin-top:12px"><label>GitHub Token</label>
        <div class="tokrow"><input id="tok-in" type="password" placeholder="github_pat_..."><button class="btn" onclick="saveTok()">저장</button></div>
      </div>`;
    return;
  }
  const fieldsBySide={
    buy:['code','name','qty','price','reason'], sell:['code','name','qty','price','reason'],
    deposit:['amount','reason'], withdraw:['amount','reason'],
    dividend:['code','name','perShare','reason'], note:['text']
  };
  const fields=fieldsBySide[side];
  const label={code:'종목코드(6자리)',name:'종목명',qty:'수량',price:'가격',amount:'금액',perShare:'주당 배당금',reason:'이유',text:'코멘트'};
  const ph={code:'예: 069500',name:'예: KODEX 200'};
  const segLabel={buy:'매수',sell:'매도',deposit:'입금',withdraw:'출금',dividend:'분배금',note:'코멘트'};
  body.innerHTML=`<h3>매매 기록</h3>
    <div class="seg">${Object.keys(segLabel).map(s=>`<button class="${s===side?'on':''}" onclick="setSide('${s}')">${segLabel[s]}</button>`).join('')}</div>
    <div id="f-fields">${fields.map(f=>`<div class="frow"><label>${label[f]}</label>
      ${(f==='reason'||f==='text')?`<textarea id="f-${f}"></textarea>`
        :`<input id="f-${f}" ${['qty','price','amount','perShare'].includes(f)?'type="number"':''} placeholder="${ph[f]||''}">`}
      </div>`).join('')}</div>
    <button class="btn" style="width:100%;padding:12px" onclick="submitForm()">저장</button>
    <div class="msg" id="m-msg"></div>
    <h3>최근 거래</h3>
    <div id="recent-tx">${recentTxHtml()}</div>
    <div class="small link" onclick="if(confirm('토큰을 이 기기에서 지울까요?')){setTok('');renderAdmin();}">토큰 지우기</div>`;
}

function submitForm(){
  const feeRate=(DATA.config&&DATA.config.feeRate)||0;
  const taxRate=(DATA.config&&DATA.config.tax)||0;
  if(side==='deposit'||side==='withdraw'){
    const amount=Number(val('f-amount')), reason=val('f-reason');
    if(!amount){alert('금액을 입력하세요');return;}
    commit(d=>{ d.transactions=d.transactions||[]; d.transactions.push({id:nextId(d),ts:nowIso(),side,amount,reason}); },
      `${side==='deposit'?'입금':'출금'} ${amount}`);
  } else if(side==='buy'||side==='sell'){
    const code=val('f-code'), name=val('f-name'), qty=Number(val('f-qty')), price=Number(val('f-price')), reason=val('f-reason');
    if(!code||!qty||!price){alert('종목코드/수량/가격을 입력하세요');return;}
    const fee=Math.round(qty*price*feeRate);
    commit(d=>{
      d.transactions=d.transactions||[];
      const tx={id:nextId(d),ts:nowIso(),side,symbol:symOf(code),name,qty,price,fee,reason};
      if(side==='sell') tx.tax=Math.round(qty*price*taxRate);
      d.transactions.push(tx);
    }, `${side==='buy'?'매수':'매도'} ${name||code} ${qty}주@${price}`);
  } else if(side==='dividend'){
    const code=val('f-code'), name=val('f-name'), perShare=Number(val('f-perShare')), reason=val('f-reason');
    if(!code||!perShare){alert('종목코드/주당 배당금을 입력하세요');return;}
    commit(d=>{
      const sym=symOf(code);
      const qty=(d.holdings&&d.holdings[sym]&&d.holdings[sym].qty)||0;
      const gross=qty*perShare, tax=Math.round(gross*0.154);
      d.transactions=d.transactions||[];
      d.transactions.push({id:nextId(d),ts:nowIso(),side:'dividend',symbol:sym,name,qty,price:perShare,tax,net:gross-tax,reason:reason||'분배금'});
    }, `분배금 ${name||code}`);
  } else if(side==='note'){
    const text=val('f-text');
    if(!text){alert('코멘트를 입력하세요');return;}
    commit(d=>{ d.notes=d.notes||[]; d.notes.push({id:nextId(d),ts:nowIso(),text}); }, '코멘트 추가');
  }
}
function delTx(id){
  if(!confirm('이 거래를 삭제할까요?'))return;
  commit(d=>{
    d.transactions=(d.transactions||[]).filter(t=>t.id!==id);
    d.notes=(d.notes||[]).filter(n=>n.id!==id);
  }, `거래 삭제 id=${id}`);
}
function saveTok(){
  const t=val('tok-in'); if(!t){alert('토큰을 입력하세요');return;}
  setTok(t); renderAdmin();
}

load();
setInterval(refresh, 60000);
</script>
